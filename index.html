<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jewel Viewer</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>

    <h1>💎 Jewel Viewer</h1>

    <p>
        YouTube Live Chat Replay（NDJSON）
        <br>
        ジュエルギフト専用ビューア
    </p>

</header>

<main>

    <section class="card">

        <label>
            チャットJSON
            <input
                type="file"
                id="fileInput"
                accept=".json,.txt,.ndjson">
        </label>

    </section>

    <section class="card filters">

        <div>

            <label>最低ジュエル</label>

            <select id="minJewel">

                <option value="0">すべて</option>
                <option value="100">100以上</option>
                <option value="500">500以上</option>
                <option value="1000">1000以上</option>
                <option value="5000">5000以上</option>
                <option value="10000">10000以上</option>

            </select>

        </div>

        <div>

            <label>ユーザー検索</label>

            <input
                id="searchName"
                type="text"
                placeholder="ユーザー名">

        </div>

        <div>

            <label>並び替え</label>

            <select id="sortBy">

                <option value="time">
                    時間順
                </option>

                <option value="jewel">
                    ジュエル順
                </option>

                <option value="amount">
                    金額順
                </option>

                <option value="name">
                    名前順
                </option>

            </select>

        </div>

    </section>

    <section class="stats">

        <div class="stat">

            <span>件数</span>

            <strong id="count">0</strong>

        </div>

        <div class="stat">

            <span>合計ジュエル</span>

            <strong id="totalJewel">0</strong>

        </div>

        <div class="stat">

            <span>合計金額</span>

            <strong id="totalAmount">¥0</strong>

        </div>

    </section>

    <section class="card">

        <button id="downloadCsv">

            CSVダウンロード

        </button>

    </section>

    <section class="card table-area">

        <table>

            <thead>

            <tr>

                <th>時間</th>

                <th>画像</th>

                <th>ユーザー</th>

                <th>ギフト</th>

                <th>ジュエル</th>

                <th>金額</th>

            </tr>

            </thead>

            <tbody id="resultBody">

            <tr>

                <td colspan="6">

                    JSONを読み込んでください

                </td>

            </tr>

            </tbody>

        </table>

    </section>

</main>

<footer>

    Jewel Viewer v2.0

</footer>

<script src="gift-map.js"></script>
<script src="parser.js"></script>
<script src="script.js"></script>
<script src="csv.js"></script>

</body>
</html>
